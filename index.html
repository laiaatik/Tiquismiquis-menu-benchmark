.sub{font-size:13px;color:var(--t2);margin-top:5px;font-family:sans-serif;}
.pills{display:flex;flex-direction:column;gap:5px;align-items:flex-end;}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--t3);border:.5px solid var(--b2);border-radius:20px;padding:3px 10px;background:var(--card);white-space:nowrap;font-family:sans-serif;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
.tabs{display:flex;gap:0;margin-bottom:1.75rem;border-bottom:1px solid var(--b1);overflow-x:auto;}
.tab{padding:10px 18px;font-size:13px;cursor:pointer;background:none;border:none;color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:'Georgia',serif;white-space:nowrap;transition:all .15s;}
.tab:hover{color:var(--t1);}
.tab.active{color:var(--t1);border-bottom-color:var(--t1);}
.view{display:none;}
.view.active{display:block;}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.5rem;}
.metrics-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1.5rem;}
.met{background:var(--sec);border-radius:var(--rs);padding:12px 14px;}
.met-l{font-size:11px;color:var(--t2);margin-bottom:4px;font-family:sans-serif;}
.met-v{font-size:19px;font-weight:normal;}
.met-s{font-size:10px;color:var(--t3);margin-top:2px;font-family:sans-serif;}
.card{background:var(--card);border:.5px solid var(--b1);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;}
.card.g{border-left:3px solid var(--green);}
.card.r{border-left:3px solid var(--red);}
.card.a{border-left:3px solid var(--amber);}
.card.w{border:2px solid var(--green);}
.ct{font-size:13px;font-weight:bold;margin-bottom:6px;font-family:sans-serif;}
.cb{font-size:12px;color:var(--t2);line-height:1.65;font-family:sans-serif;}
.tw{overflow-x:auto;margin-bottom:1.25rem;}
table{width:100%;border-collapse:collapse;font-size:12px;font-family:sans-serif;}
th{font-weight:600;font-size:11px;color:var(--t2);text-align:left;padding:7px 8px;border-bottom:1px solid var(--b1);white-space:nowrap;background:var(--bg);position:sticky;top:0;z-index:1;}
th.rec-h{background:#EAF3DE;color:var(--green);}
td{padding:6px 8px;border-bottom:.5px solid var(--b1);color:var(--t1);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(0,0,0,.02);}
.cr td{background:var(--sec);font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;padding:9px 8px 4px;}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;font-family:sans-serif;}
.ok{background:var(--gl);color:var(--green);}
.low{background:var(--rl);color:var(--red);}
.high{background:var(--bl);color:var(--blue);}
.warn{background:var(--al);color:var(--amber);}

.tu{background:var(--gl);color:var(--green);}
.tdtag{background:var(--rl);color:var(--red);}
.tw2{background:var(--al);color:var(--amber);}
.trow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:.5px solid var(--b1);font-family:sans-serif;}
.trow:last-child{border-bottom:none;}
.tname{font-size:12px;font-weight:600;flex:1.5;}
.tbw{flex:1.5;position:relative;height:5px;background:var(--sec);border-radius:3px;}
.tbar{position:absolute;height:100%;border-radius:3px;}
.tch{font-size:12px;font-weight:600;width:55px;text-align:right;}
.tn{font-size:11px;color:var(--t3);flex:2;}
.stitle{font-size:13px;font-weight:bold;margin:1.5rem 0 .75rem;font-family:sans-serif;}
.tip{font-size:12px;color:var(--t2);background:var(--sec);border-radius:var(--rs);padding:10px 14px;margin-bottom:1rem;line-height:1.5;font-family:sans-serif;}
.snote{font-size:11px;color:var(--t3);background:var(--sec);border-radius:var(--rs);padding:7px 12px;margin-bottom:1rem;font-family:sans-serif;}
hr.div{border:none;border-top:.5px solid var(--b1);margin:1.5rem 0;}
select{padding:6px 10px;border:.5px solid var(--b2);border-radius:var(--rs);font-size:12px;background:var(--card);color:var(--t1);font-family:sans-serif;cursor:pointer;}
.frow{display:flex;gap:10px;align-items:center;margin-bottom:1rem;flex-wrap:wrap;}

.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1rem;font-family:sans-serif;font-size:11px;color:var(--t2);}

const CATS=[...new Set(DATA.map(d=>d[0]))];

function pVals(row){return row.slice(3).filter(v=>v!==null&&v>0&&v<100);}
function pAvg(row){const v=pVals(row);return v.length?parseFloat((v.reduce((s,x)=>s+x,0)/v.length).toFixed(2)):null;}
function pMin(row){const v=pVals(row);return v.length?Math.min(...v):null;}
function pMax(row){const v=pVals(row);return v.length?Math.max(...v):null;}
function pN(row){return pVals(row).length;}

// Category avg fallback
const CATBM={};
CATS.forEach(cat=>{
  const all=[];
  DATA.filter(d=>d[0]===cat).forEach(r=>pVals(r).forEach(v=>all.push(v)));
  if(all.length){
    all.sort((a,b)=>a-b);
    CATBM[cat]={mid:parseFloat((all.reduce((s,v)=>s+v,0)/all.length).toFixed(2)),low:all[0],high:all[all.length-1]};
  }
});

function fmt(n){return typeof n==='number'&&!isNaN(n)?n.toFixed(2):'–';}

function recommend(tq,row,cat){
  const avg=pAvg(row);
  const n=pN(row);
  const ref=(avg!==null&&n>=2)?avg:(CATBM[cat]?.mid??null);
  const fallback=(avg===null||n<2);
  if(!ref)return{action:'Sin datos suficientes',cls:'ok',rec:tq,fc:tq*0.32,ref:null,fallback,note:'–'};
  const pct=((tq-ref)/ref)*100;
  let action,cls,rec,note;
  if(pct<-15){
    rec=parseFloat((ref*0.95).toFixed(2));
    action='Subir → €'+fmt(rec);
    cls='low';
    note='Margen en riesgo — '+Math.abs(pct).toFixed(0)+'% bajo la media';
  } else if(pct>20){
    rec=tq;
    action='Justificar calidad';
    cls='high';
    note=pct.toFixed(0)+'% sobre mercado — producto debe respaldarlo';
  } else {
    rec=tq;
    action='Mantener';
    cls='ok';
    note='Rango de mercado correcto';
  }
  return{action,cls,rec,fc:tq*0.32,ref,fallback,note,pct};
}

// ── CHECKER ───────────────────────────────────────────────────────────────
function buildRows(filterCat){
  let rows='';let ok=0,low=0,high=0;
  CATS.forEach(cat=>{
    if(filterCat!=='all'&&cat!==filterCat)return;
    const catRows=DATA.filter(d=>d[0]===cat);
    rows+=`<tr class="cr"><td colspan="9">${cat}</td></tr>`;
    catRows.forEach(row=>{
      const tq=row[2];
      const avg=pAvg(row);const n=pN(row);
      const mn=pMin(row);const mx=pMax(row);
      const rec=recommend(tq,row,cat);
      if(rec.cls==='ok')ok++;else if(rec.cls==='low')low++;else high++;
      const displayAvg=rec.ref;
      const diff=displayAvg?(tq-displayAvg):0;
      const diffStr=displayAvg?(diff>=0?'+€'+Math.abs(diff).toFixed(2):'-€'+Math.abs(diff).toFixed(2)):'–';
      const dc=rec.cls==='low'?'var(--red)':rec.cls==='high'?'var(--blue)':'var(--green)';
      const barLow=mn??CATBM[cat]?.low??tq;
      const barHigh=mx??CATBM[cat]?.high??tq;
      const range=(barHigh-barLow)||1;
      const pct2=Math.min(Math.max(((tq-barLow)/range)*100,0),100);
      const refLabel=rec.fallback?'<span style="font-size:9px;color:var(--t3)"> (cat.)</span>':'';
      const nLabel=rec.fallback?'cat.':n+'ref';
      const bar=`<div style="display:flex;align-items:center;gap:5px;"><div style="position:relative;width:80px;height:5px;background:#e8e6e0;border-radius:3px;flex-shrink:0;"><div style="position:absolute;width:100%;height:100%;background:#B5D4F4;opacity:.25;border-radius:3px;"></div><div style="position:absolute;left:${pct2}%;width:8px;height:8px;background:#185FA5;border-radius:50%;top:-1.5px;transform:translateX(-4px);"></div></div><span style="font-size:10px;color:#a09c97">${nLabel}</span></div>`;
      const recCls=rec.cls==='low'?'color:var(--red);font-weight:600':rec.cls==='high'?'color:var(--blue);font-weight:600':'color:var(--green);font-weight:600';
      rows+=`<tr>
        <td style="font-weight:600;font-size:11px;max-width:180px">${row[1]}</td>
        <td style="font-weight:700;color:var(--blue)">€${fmt(tq)}</td>
        <td>${bar}</td>
        <td style="color:var(--t2)">${displayAvg?'€'+fmt(displayAvg):'–'}${refLabel}</td>
        <td style="font-size:10px;color:var(--t3)">${mn?'€'+fmt(mn):'–'} – ${mx?'€'+fmt(mx):'–'}</td>
        <td style="color:${dc};font-size:11px">${diffStr}</td>
        <td style="font-size:11px;color:var(--t2)">€${fmt(rec.fc)}</td>
        <td style="${recCls};font-size:11px">${rec.action}</td>
        <td><span class="badge ${rec.cls}">${rec.cls==='ok'?'Correcto':rec.cls==='low'?'Bajo':'Alto'}</span></td>
      </tr>`;
    });
  });
  return{rows,ok,low,high};
}

function renderChecker(){
  const el=document.getElementById('view-checker');

  el.innerHTML=`

function makeCheckerTable(rows){

// ── COMPARADOR ────────────────────────────────────────────────────────────
function renderComparador(){
  const el=document.getElementById('view-comparador');
  function buildTable(cat,comps){
    const rows=cat==='all'?DATA:DATA.filter(d=>d[0]===cat);
    const idxs=comps.map(c=>COMPS.indexOf(c)).filter(i=>i>=0);
    let thead=`<tr><th style="min-width:150px">Plato</th><th style="color:var(--blue);font-weight:700">TiqisMiquis</th><th>Media producto</th>`;
    idxs.forEach(i=>{thead+=`<th style="min-width:60px">${COMPS[i].split(' ').slice(0,2).join(' ')}</th>`;});
    thead+='</tr>';
    let tbody='',lastCat='';
    rows.forEach(row=>{
      if(row[0]!==lastCat){tbody+=`<tr class="cr"><td colspan="${3+idxs.length}">${row[0]}</td></tr>`;lastCat=row[0];}
      const tq=row[2];const avg=pAvg(row);const n=pN(row);
      const displayAvg=(avg!==null&&n>=2)?avg:CATBM[row[0]]?.mid;
      const isFB=(avg===null||n<2);
      const diff=displayAvg?(tq-displayAvg):null;
      const dc=diff===null?'var(--t3)':diff<-0.5?'var(--red)':diff>0.5?'var(--blue)':'var(--green)';
      tbody+=`<tr><td style="font-weight:600;font-size:11px;max-width:170px">${row[1]}</td>`;
      tbody+=`<td style="font-weight:700;color:var(--blue)">€${fmt(tq)}</td>`;
      tbody+=`<td style="color:${dc};font-weight:600">${displayAvg?'€'+fmt(displayAvg):'–'}${isFB?'<span style="font-size:9px;color:var(--t3)"> cat.</span>':''}</td>`;
      idxs.forEach(i=>{
        const v=row[3+i];
        if(v===null||v===0){tbody+=`<td style="color:var(--t3)">–</td>`;return;}
        const d2=tq-v;
        const bg=d2>1?'#EAF3DE30':d2<-1?'#FCEBEB30':'';
        const tc=d2>1?'var(--green)':d2<-1?'var(--red)':'var(--t1)';
        tbody+=`<td style="background:${bg};color:${tc};font-weight:${Math.abs(d2)>1?'600':'400'}">€${fmt(v)}</td>`;
      });
      tbody+='</tr>';
    });
    return`<div class="tw"><table style="font-size:11px"><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
  }
  el.innerHTML=`
    <div class="snote">Verde = TiqisMiquis más caro. Rojo = más barato. "Media producto" = media de ese plato concreto (mín. 2 refs); si no, media de categoría (cat.).</div>
    <div class="tip">Selecciona categoría y competidores para comparar plato a plato.</div>
    <div class="frow">
      <label>Categoría:</label>
      <select id="comp-cat" onchange="updateComp()">
        <option value="all">Todas</option>
        ${CATS.map(c=>`<option value="${c}">${c}</option>`).join('')}
      </select>
    </div>
    <div style="margin-bottom:1rem;">
      <div style="font-size:12px;color:var(--t2);font-family:sans-serif;margin-bottom:6px;">Competidores (hasta 12):</div>
      <div id="comp-checks" style="display:flex;flex-wrap:wrap;gap:6px;">
        ${COMPS.map((c,i)=>`<label style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-family:sans-serif;cursor:pointer;padding:3px 8px;border:.5px solid var(--b2);border-radius:20px;background:${i<12?'var(--sec)':'var(--card)'};">
          <input type="checkbox" value="${i}" ${i<12?'checked':''} onchange="updateComp()" style="width:12px;height:12px;"> ${c}
        </label>`).join('')}
      </div>
    </div>
    <div id="comp-table-wrap"></div>`;
  window.updateComp=function(){
    const cat=document.getElementById('comp-cat').value;
    const checks=[...document.querySelectorAll('#comp-checks input:checked')].map(cb=>COMPS[parseInt(cb.value)]);
    document.getElementById('comp-table-wrap').innerHTML=buildTable(cat,checks.slice(0,12));
  };
  window.updateComp();
}
