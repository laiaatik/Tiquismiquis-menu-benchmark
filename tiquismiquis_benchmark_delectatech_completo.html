<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TiqisMiquis — Benchmark Completo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fafaf8;--card:#fff;--sec:#f4f3f0;
  --t1:#1a1917;--t2:#6b6862;--t3:#a09c97;
  --b1:rgba(26,25,23,.10);--b2:rgba(26,25,23,.18);
  --green:#3B6D11;--gl:#EAF3DE;
  --red:#A32D2D;--rl:#FCEBEB;
  --blue:#185FA5;--bl:#E6F1FB;
  --amber:#854F0B;--al:#FAEEDA;
  --r:10px;--rs:6px;
}
body{font-family:'Georgia',serif;background:var(--bg);color:var(--t1);min-height:100vh;}
.page{max-width:1100px;margin:0 auto;padding:1.5rem 1.5rem 4rem;}

/* Header */
.hdr{margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:1px solid var(--b1);}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;}
.brand{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:5px;font-family:sans-serif;}
.title{font-size:26px;font-weight:normal;line-height:1.2;}
.title em{font-style:italic;color:var(--green);}
.sub{font-size:13px;color:var(--t2);margin-top:5px;font-family:sans-serif;}
.pills{display:flex;flex-direction:column;gap:5px;align-items:flex-end;}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--t3);border:.5px solid var(--b2);border-radius:20px;padding:3px 10px;background:var(--card);white-space:nowrap;font-family:sans-serif;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);}

/* Tabs */
.tabs{display:flex;gap:0;margin-bottom:1.75rem;border-bottom:1px solid var(--b1);overflow-x:auto;}
.tab{padding:10px 18px;font-size:13px;cursor:pointer;background:none;border:none;color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:'Georgia',serif;white-space:nowrap;transition:all .15s;}
.tab:hover{color:var(--t1);}
.tab.active{color:var(--t1);border-bottom-color:var(--t1);}
.view{display:none;}
.view.active{display:block;}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.5rem;}
.metrics-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:1.5rem;}
.met{background:var(--sec);border-radius:var(--rs);padding:12px 14px;}
.met-l{font-size:11px;color:var(--t2);margin-bottom:4px;font-family:sans-serif;}
.met-v{font-size:19px;font-weight:normal;}
.met-s{font-size:10px;color:var(--t3);margin-top:2px;font-family:sans-serif;}

/* Cards */
.card{background:var(--card);border:.5px solid var(--b1);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;}
.card.g{border-left:3px solid var(--green);}
.card.r{border-left:3px solid var(--red);}
.card.a{border-left:3px solid var(--amber);}
.card.w{border:2px solid var(--green);}
.ct{font-size:13px;font-weight:bold;margin-bottom:6px;font-family:sans-serif;}
.cb{font-size:12px;color:var(--t2);line-height:1.65;font-family:sans-serif;}

/* Table */
.tw{overflow-x:auto;margin-bottom:1.25rem;}
table{width:100%;border-collapse:collapse;font-size:12px;font-family:sans-serif;}
th{font-weight:600;font-size:11px;color:var(--t2);text-align:left;padding:6px 8px;border-bottom:1px solid var(--b1);white-space:nowrap;}
td{padding:6px 8px;border-bottom:.5px solid var(--b1);color:var(--t1);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--sec);}
.cr td{background:var(--sec);font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;padding:9px 8px 4px;}

/* Badges */
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;font-family:sans-serif;}
.ok{background:var(--gl);color:var(--green);}
.low{background:var(--rl);color:var(--red);}
.high{background:var(--bl);color:var(--blue);}
.warn{background:var(--al);color:var(--amber);}

/* Tags */
.tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;margin-right:3px;font-weight:600;font-family:sans-serif;}
.tu{background:var(--gl);color:var(--green);}
.td{background:var(--rl);color:var(--red);}
.tw2{background:var(--al);color:var(--amber);}

/* Trend rows */
.trow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:.5px solid var(--b1);font-family:sans-serif;}
.trow:last-child{border-bottom:none;}
.tname{font-size:12px;font-weight:600;flex:1.5;}
.tbw{flex:1.5;position:relative;height:5px;background:var(--sec);border-radius:3px;}
.tbar{position:absolute;height:100%;border-radius:3px;}
.tch{font-size:12px;font-weight:600;width:55px;text-align:right;}
.tn{font-size:11px;color:var(--t3);flex:2;}

.stitle{font-size:13px;font-weight:bold;margin:1.5rem 0 .75rem;font-family:sans-serif;}
.tip{font-size:12px;color:var(--t2);background:var(--sec);border-radius:var(--rs);padding:10px 14px;margin-bottom:1rem;line-height:1.5;font-family:sans-serif;}
.snote{font-size:11px;color:var(--t3);background:var(--sec);border-radius:var(--rs);padding:7px 12px;margin-bottom:1rem;font-family:sans-serif;}
hr.div{border:none;border-top:.5px solid var(--b1);margin:1.5rem 0;}
select,input{padding:6px 10px;border:.5px solid var(--b2);border-radius:var(--rs);font-size:12px;background:var(--card);color:var(--t1);font-family:sans-serif;cursor:pointer;}
.frow{display:flex;gap:10px;align-items:center;margin-bottom:1rem;flex-wrap:wrap;}
.frow label{font-size:12px;color:var(--t2);font-family:sans-serif;}

/* Comparador specifics */
.comp-table th{font-size:10px;padding:5px 6px;}
.comp-table td{font-size:11px;padding:5px 6px;}
.comp-table .tq{font-weight:700;color:var(--blue);}
.comp-table .low-p{color:var(--red);}
.comp-table .high-p{color:var(--green);}
.comp-table .mid-p{color:var(--t2);}
.comp-heatmap{background:#EAF3DE;color:#3B6D11;}
.comp-heatmap2{background:#fff3cd;color:#856404;}
.comp-heatmap3{background:#FCEBEB;color:#A32D2D;}

@media(max-width:600px){
  .metrics,.metrics-3{grid-template-columns:repeat(2,1fr);}
  .tabs{overflow-x:auto;}
  .tab{padding:10px 12px;}
}
</style>

const CATS = [...new Set(DATA.map(d=>d[0]))];

// Build benchmarks from real data
function buildBM() {
  const bm = {};
  CATS.forEach(cat => {
    const rows = DATA.filter(d=>d[0]===cat);
    let all = [];
    rows.forEach(row => {
      for(let i=3;i<row.length;i++) {
        if(row[i]!==null && row[i]>0 && row[i]<50) all.push(row[i]);
      }
    });
    if(all.length>0) {
      all.sort((a,b)=>a-b);
      const mid = all.reduce((s,v)=>s+v,0)/all.length;
      bm[cat] = { low:all[0], mid:parseFloat(mid.toFixed(2)), high:all[all.length-1], n:all.length };
    }
  });
  return bm;
}

const BM = buildBM();

function classify(price, cat) {
  const b = BM[cat]; if(!b) return 'ok';
  if(price < b.mid*0.85) return 'low';
  if(price > b.mid*1.20) return 'high';
  return 'ok';
}
function fmt(n) { return typeof n==='number' ? n.toFixed(2) : '–'; }
function avg(arr) { const v=arr.filter(x=>x!==null&&x>0); return v.length?v.reduce((s,x)=>s+x,0)/v.length:null; }

function renderChecker() {

      const dc = cls==='low'?'var(--red)':cls==='high'?'var(--blue)':'var(--green)';

      rows+=`<tr><td style="font-weight:600">${row[1]}</td><td style="font-weight:600;color:var(--blue)">€${fmt(price)}</td><td>${bar}</td><td style="color:var(--t2)">€${fmt(b.mid)}</td><td style="color:${dc};font-size:11px">${diffStr}</td><td style="font-size:11px">€${maxFC}</td><td><span class="badge ${cls}">${cls==='ok'?'Correcto':cls==='low'?'Bajo':'Alto'}</span></td></tr>`;

    <div class="metrics">
      <div class="met"><div class="met-l">Bien posicionados</div><div class="met-v" style="color:var(--green)">${ok}</div><div class="met-s">±15% de la media real</div></div>
      <div class="met"><div class="met-l">Posiblemente bajos</div><div class="met-v" style="color:var(--red)">${under}</div><div class="met-s">más de 15% bajo la media</div></div>
      <div class="met"><div class="met-l">Por encima</div><div class="met-v" style="color:var(--blue)">${hi}</div><div class="met-s">justificar con calidad</div></div>
      <div class="met"><div class="met-l">Ticket medio Cataluña</div><div class="met-v">€26–27</div><div class="met-s">Delectatech 2025</div></div>
    </div>
    <div class="frow">
      <label>Filtrar:</label>
      <select onchange="window.filterChecker(this.value)">
        <option value="all">Todas las categorías</option>
        ${CATS.map(c=>`<option value="${c}">${c}</option>`).join('')}
      </select>

    <div id="ct-body"></div>

  document.getElementById('ct-body').innerHTML = `<div class="tw"><table><thead><tr><th>Plato</th><th>Tu precio</th><th>Posición en rango</th><th>Media mercado</th><th>Diferencia</th><th>Max FC 32%</th><th>Veredicto</th></tr></thead><tbody>${rows}</tbody></table></div>`;

      r2+=`<tr class="cr"><td colspan="7">${cat} · rango: €${fmt(b.low)}–${fmt(b.high)} · media: €${fmt(b.mid)}</td></tr>`;
      DATA.filter(d=>d[0]===cat).forEach(row=>{
        const price=row[2];const cls=classify(price,cat);
        const maxFC=(price*0.32).toFixed(2);
        const diff=b.mid?(price-b.mid):0;
        const diffStr=diff>=0?`+€${Math.abs(diff).toFixed(2)}`:`-€${Math.abs(diff).toFixed(2)}`;
        const dc=cls==='low'?'var(--red)':cls==='high'?'var(--blue)':'var(--green)';
        const range=(b.high-b.low)||1;
        const pct=Math.min(Math.max(((price-b.low)/range)*100,0),100);
        const bar=`<div style="display:flex;align-items:center;gap:5px;"><div style="position:relative;width:90px;height:5px;background:#e8e6e0;border-radius:3px;flex-shrink:0;"><div style="position:absolute;width:100%;height:100%;background:#B5D4F4;opacity:.25;border-radius:3px;"></div><div style="position:absolute;left:${pct}%;width:8px;height:8px;background:#185FA5;border-radius:50%;top:-1.5px;transform:translateX(-4px);"></div></div><span style="font-size:10px;color:#a09c97">€${fmt(b.low)}–${fmt(b.high)}</span></div>`;

      });

// ─── COMPARADOR REAL ───────────────────────────────────────────────────────
function renderComparador() {
  const el = document.getElementById('view-comparador');
  // Show max 12 competitors at a time + TQ
  let selCat = 'all'; let selComp = [...COMPS.slice(0,12)];

  function buildTable(cat, comps) {
    const rows = cat==='all' ? DATA : DATA.filter(d=>d[0]===cat);
    const idxs = comps.map(c=>COMPS.indexOf(c)).filter(i=>i>=0);

    let thead = `<tr><th style="min-width:160px">Plato</th><th style="color:var(--blue);font-weight:700">TiqisMiquis</th><th>Media</th>`;
    idxs.forEach(i=>{ thead+=`<th style="min-width:70px">${COMPS[i].split(' ').slice(0,2).join(' ')}</th>`; });
    thead += '</tr>';

    let tbody='';
    let lastCat='';
    rows.forEach(row=>{
      if(row[0]!==lastCat){
        tbody+=`<tr class="cr"><td colspan="${3+idxs.length}">${row[0]}</td></tr>`;
        lastCat=row[0];
      }
      const tq=row[2];
      const compVals = idxs.map(i=>row[3+i]);
      const validVals = compVals.filter(v=>v!==null&&v>0);
      const me = validVals.length ? (validVals.reduce((s,v)=>s+v,0)/validVals.length) : null;
      const diff = me ? (tq-me) : null;
      const dc = diff===null?'var(--t3)':diff<-0.5?'var(--red)':diff>0.5?'var(--blue)':'var(--green)';

      tbody+=`<tr><td style="font-weight:600;max-width:200px">${row[1]}</td>`;
      tbody+=`<td style="font-weight:700;color:var(--blue)">€${fmt(tq)}</td>`;
      tbody+=`<td style="color:${dc};font-weight:600">${me?'€'+fmt(me):'–'}</td>`;
      idxs.forEach(i=>{
        const v=row[3+i];
        if(v===null||v===0){ tbody+=`<td style="color:var(--t3)">–</td>`; return; }
        const diff2=tq-v;
        const bg = diff2>1?'#EAF3DE20':diff2<-1?'#FCEBEB20':'';
        const tc = diff2>1?'var(--green)':diff2<-1?'var(--red)':'var(--t1)';
        tbody+=`<td style="background:${bg};color:${tc};font-weight:${Math.abs(diff2)>1?'600':'400'}">€${fmt(v)}</td>`;
      });
      tbody+='</tr>';
    });

    return `<div class="tw"><table class="comp-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table></div>`;
  }

  el.innerHTML = `
    <div class="snote">Precios directos del "Comparador de precios" de TiqisMiquis. Verde = TiqisMiquis más caro que ese competidor. Rojo = más barato.</div>
    <div class="tip">Compara tus precios contra los de cada establecimiento. Selecciona la categoría y los competidores que quieres ver.</div>
    <div class="frow">
      <label>Categoría:</label>
      <select id="comp-cat" onchange="window.updateComp()">
        <option value="all">Todas</option>
        ${CATS.map(c=>`<option value="${c}">${c}</option>`).join('')}
      </select>
    </div>
    <div style="margin-bottom:1rem;">
      <div style="font-size:12px;color:var(--t2);font-family:sans-serif;margin-bottom:6px;">Competidores (selecciona hasta 12):</div>
      <div id="comp-checks" style="display:flex;flex-wrap:wrap;gap:6px;">
        ${COMPS.map((c,i)=>`<label style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-family:sans-serif;cursor:pointer;padding:3px 8px;border:.5px solid var(--b2);border-radius:20px;background:${i<12?'var(--sec)':'var(--card)'};">
          <input type="checkbox" value="${i}" ${i<12?'checked':''} onchange="window.updateComp()" style="width:12px;height:12px;cursor:pointer;"> ${c}
        </label>`).join('')}
      </div>
    </div>
    <div id="comp-table-wrap"></div>
  `;

  window.updateComp = function() {
    const cat = document.getElementById('comp-cat').value;
    const checks = [...document.querySelectorAll('#comp-checks input:checked')].map(cb=>COMPS[parseInt(cb.value)]);
    document.getElementById('comp-table-wrap').innerHTML = buildTable(cat, checks.slice(0,12));
  };

  window.updateComp();
}
